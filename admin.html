<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a14; }
        .admin-container { max-width: 600px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .admin-container h2 { text-align: center; margin-bottom: 24px; color: #e0e0f0; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; color: #b0b0c0; margin-bottom: 5px; font-weight: 600; }
        .input-group input, .input-group textarea { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; outline: none; font-family: inherit; }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .link-hint { font-size: 11px; color: #6a6a80; margin-top: 4px; }
        .btn-salvar { width: 100%; padding: 14px; border-radius: 30px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; margin-top: 10px; }
        .btn-salvar:hover { opacity: 0.9; }
        .sucesso { color: #4ade80; text-align: center; margin-top: 10px; display: none; }
        .voltar { text-align: center; margin-top: 20px; }
        .voltar a { color: #808098; text-decoration: none; font-size: 13px; }
        .voltar a:hover { color: #a78bfa; }
        .btn-sair { color: #f87171; font-size: 12px; text-decoration: none; }
        .btn-sair:hover { color: #ef4444; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span></span>
            <a href="#" onclick="logout()" class="btn-sair" id="btn-sair" style="display:none;">🚪 Sair</a>
        </div>
        <h2>⚙️ Editar Landing Page</h2>
        
        <div class="input-group"><label>Título Principal</label><input type="text" id="admin-titulo" placeholder="Título do hero"></div>
        <div class="input-group"><label>Subtítulo / Descrição</label><textarea id="admin-subtitulo" placeholder="Descrição abaixo do título"></textarea></div>
        <div class="input-group"><label>Preço</label><input type="text" id="admin-preco" placeholder="Ex: 97"></div>
        <div class="input-group"><label>🔗 Link de Compra (Kiwify, Hotmart, etc.)</label><input type="text" id="admin-link-compra" placeholder="https://kiwify.com/..."></div>
        <div class="input-group">
            <label>🎬 ID ou Link do Vídeo YouTube</label>
            <input type="text" id="admin-video" placeholder="dQw4w9WgXcQ ou link completo">
            <div class="link-hint">💡 Cole o link completo ou apenas o ID do vídeo</div>
        </div>
        
        <hr style="border-color:rgba(255,255,255,0.06); margin:20px 0;">
        <h3 style="color:#c0c0d0; margin-bottom:14px;">📁 Site de Exemplo</h3>
        
        <div class="input-group"><label>🖼️ Link da Imagem de Preview</label><input type="text" id="admin-exemplo-img" placeholder="https://..."></div>
        <div class="input-group"><label>🔗 Link do Site de Exemplo</label><input type="text" id="admin-exemplo-link" placeholder="https://..."></div>
        
        <button class="btn-salvar" onclick="salvarConfig()">💾 Salvar Alterações</button>
        <p class="sucesso" id="msg-sucesso">✅ Salvo com sucesso!</p>
        
        <div class="voltar"><a href="index.html">← Voltar para a página</a></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script-admin.js"></script>
    <script>
        if (localStorage.getItem('lp_admin_logado') === 'sim') {
            document.getElementById('btn-sair').style.display = 'inline';
        }
    </script>
</body>
</html>
